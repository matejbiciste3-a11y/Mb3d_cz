<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mb3D_CZ | Přihlášení</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <img src="70690e3f-d993-44bb-898c-eb245edbb22f.jpg" alt="Mb3D_CZ" class="logo-img" onerror="this.style.display='none'">
            <span>Mb3D_CZ</span>
        </a>
        <ul>
            <li><a href="index.html">Domů</a></li>
            <li><a href="filamenty.html">Filamenty</a></li>
            <li><a href="cenik.html">Ceník</a></li>
            <li><a href="stl.html">STL soubory</a></li>
            <li><a href="naklady.html">Náklady</a></li>
            <li><a href="login.html" class="active">Přihlášení</a></li>
            <li><input type="text" placeholder="Hledat..."></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="container login-container">
        <div class="login-card">
            <h1><i class="fas fa-lock"></i> Přihlášení</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="admin@mb3d.cz" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Heslo</label>
                    <input type="password" id="loginPassword" placeholder="Zadej heslo" required>
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Přihlásit</button>
            </form>

            <div id="authMessage" class="auth-message"></div>

            <div id="userInfo" style="display: none; margin-top: 15px; padding: 20px; background: var(--bg-card); border-radius: var(--radius-sm); text-align: center; border: 1px solid var(--border-color);">
                <p><i class="fas fa-check-circle" style="color: #00cc66;"></i> Přihlášen jako: <strong id="currentUserEmail"></strong></p>
                <p style="font-size: 14px; color: var(--text-secondary);">Role: <span id="currentUserRole"></span></p>
                <button onclick="logoutUser()" class="btn-warning" style="margin-top: 10px; width: 100%; justify-content: center;">
                    <i class="fas fa-sign-out-alt"></i> Odhlásit
                </button>
            </div>

            <div class="login-info">
                <i class="fas fa-info-circle"></i> Admin: admin@mb3d.cz / Admin2024!
                <br>
                <i class="fas fa-user"></i> User: bratr@mb3d.cz / Bratr2024!
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Mb3D_CZ &bull; Všechna práva vyhrazena</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
