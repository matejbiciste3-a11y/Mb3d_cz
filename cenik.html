<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mb3D_CZ | Modely</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="70690e3f-d993-44bb-898c-eb245edbb22f.jpg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="authGuard">
        <i class="fas fa-lock"></i>
        <h1>Přístup zamítnut</h1>
        <p>Pro přístup k této stránce se musíš <a href="login.html">přihlásit</a>.</p>
    </div>

    <div id="protectedContent">
        <nav>
            <a href="index.html" class="logo">
                <img src="70690e3f-d993-44bb-898c-eb245edbb22f.jpg" alt="Mb3D_CZ" class="logo-img" onerror="this.style.display='none'">
                <span>Mb3D_CZ</span>
            </a>
            <ul>
                <li><a href="index.html">Domů</a></li>
                <li><a href="filamenty.html">Filamenty</a></li>
                <li><a href="cenik.html" class="active">Ceník</a></li>
                <li><a href="stl.html">STL soubory</a></li>
                <li><a href="naklady.html">Náklady</a></li>
                <li><a href="profile.html">Profil</a></li>
                <li><a href="login.html">Přihlášení</a></li>
                <li><input type="text" id="searchGlobal" placeholder="Hledat..." onkeyup="searchGlobal()"></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <div class="container">
            <h1><i class="fas fa-tag"></i> Nabídka modelů</h1>
            
            <div class="models-grid" id="modelsGrid"></div>

            <div id="addFormContainer" style="display: none;">
                <div class="form-card">
                    <h2><i class="fas fa-plus-circle"></i> Přidat model</h2>
                    <form id="addModelForm">
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="modelNazev" placeholder="Název modelu" required>
                            </div>
                            <div class="form-group">
                                <input type="number" id="modelCena" placeholder="Cena (Kč)" step="1" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="flex: 2;">
                                <input type="file" id="modelImageFile" accept="image/*" style="padding: 8px; background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); width: 100%;">
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <input type="text" id="modelObrazek" placeholder="Nebo URL obrázku">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Přidat model</button>
                    </form>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Mb3D_CZ &bull; Všechna práva vyhrazena</p>
        </footer>
    </div>

    <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(10px);">
        <div style="background: var(--bg-secondary); padding: 35px; border-radius: var(--radius); max-width: 500px; width: 90%; border: 1px solid var(--border-color); max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-glow-strong);">
            <h2 style="margin-top: 0; color: var(--primary);"><i class="fas fa-edit"></i> Upravit model</h2>
            <form id="editModelForm">
                <input type="hidden" id="editModelId">
                <div class="form-group">
                    <input type="text" id="editModelNazev" placeholder="Název modelu" required>
                </div>
                <div class="form-group">
                    <input type="number" id="editModelCena" placeholder="Cena (Kč)" step="1" required>
                </div>
                <div class="form-group">
                    <input type="file" id="editModelImageFile" accept="image/*" style="padding: 8px; background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); width: 100%;">
                </div>
                <div class="form-group">
                    <input type="text" id="editModelObrazek" placeholder="Nebo URL obrázku">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;">
                    <button type="submit" class="btn-primary" style="flex: 1; min-width: 100px;">
                        <i class="fas fa-save"></i> Uložit
                    </button>
                    <button type="button" onclick="closeEditModal()" class="btn-warning" style="flex: 1; min-width: 100px;">
                        <i class="fas fa-times"></i> Zrušit
                    </button>
                    <button type="button" onclick="deleteModelFromEdit()" class="btn-danger" style="flex: 1; min-width: 100px;">
                        <i class="fas fa-trash"></i> Smazat
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
